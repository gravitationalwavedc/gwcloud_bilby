server {
  client_max_body_size 0;
  proxy_http_version 1.1;
  proxy_request_buffering off;

  proxy_connect_timeout 600;
  proxy_send_timeout 600;
  proxy_read_timeout 600;
  send_timeout 600;

  # Django backend routes - API and auth endpoints
  location ~ ^/(graphql|file_download/|sso/) {
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass http://gwcloud_bilby_django:8000;
  }

  # Bilbyui static assets served from Django collectstatic output
  location /static/bilbyui/ {
    alias /static/bilbyui/;
    expires max;
  }

  # React dist static assets
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    root /static/;
    expires max;
    try_files $uri =404;
  }

  # All other routes proxied to Django (htmx pages)
  location / {
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_pass http://gwcloud_bilby_django:8000;
  }

  listen 8000;
}
