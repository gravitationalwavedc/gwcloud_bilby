<div
  class="toast"
  id="save-toast"
  role="alert"
  aria-live="assertive"
  aria-atomic="true"
  style="display: none; position: fixed; top: 1rem; right: 1rem; z-index: 1050;"
>
  <div class="toast-header">
    <strong class="mr-auto">Saved</strong>
  </div>
  <div class="toast-body">Changes saved successfully.</div>
</div>
<script>
  document.body.addEventListener("save-toast", function () {
    var toast = document.getElementById("save-toast");
    toast.classList.add("show");
    toast.style.display = "block";
    setTimeout(function () {
      toast.classList.remove("show");
      toast.style.display = "none";
    }, 3000);
  });
</script>
