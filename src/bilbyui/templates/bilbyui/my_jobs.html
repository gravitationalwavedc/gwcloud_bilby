{% extends "bilbyui/base.html" %}

{% block title %}My Jobs — GWCloud{% endblock %}

{% block content %}
<div class="container-fluid">
  <div class="col-md-10 offset-md-1 mb-5">
    <h1 class="pt-5 mb-4">
      My Jobs
      <span class="float-right">
        <a class="btn btn-outline-primary mr-1" href="{% url 'bilbyui:public_jobs' %}">Switch to public jobs</a>
      </span>
    </h1>

    <div class="card gw-form-card">
      <div class="card-body">
        {% include "bilbyui/_search_form.html" %}
        <div id="job-list" class="mt-4">
          {% include "bilbyui/_job_list_fragment.html" %}
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
