<div class="modal fade" id="event-id-modal-{{ job.id }}" tabindex="-1" role="dialog" aria-labelledby="event-id-modal-label-{{ job.id }}" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="event-id-modal-label-{{ job.id }}">Set Event ID</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <input type="search"
               class="form-control mb-3"
               name="q"
               placeholder="Search event IDs…"
               autocomplete="off"
               hx-get="{% url 'bilbyui:event_id_search' %}?job_id={{ job.id }}"
               hx-trigger="input changed delay:250ms, search"
               hx-target="#event-id-results"
               hx-swap="innerHTML" />
        <div id="event-id-results">
          <p class="text-muted">Type to search…</p>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  (function () {
    var modalEl = document.getElementById("event-id-modal-{{ job.id }}");
    if (!modalEl) return;

    var placeholderId = "event-id-modal-{{ job.id }}";
    var anchor = document.querySelector("[data-field='event-id']");

    function ensurePlaceholder() {
      if (!document.getElementById(placeholderId) && anchor) {
        var placeholder = document.createElement("div");
        placeholder.id = placeholderId;
        anchor.appendChild(placeholder);
      }
    }

    function hideModal() {
      if (typeof $ !== "undefined" && $.fn.modal) {
        $(modalEl).modal("hide");
      }
    }

    function showModal() {
      document.body.appendChild(modalEl);

      if (typeof $ === "undefined" || !$.fn.modal) return;

      modalEl.addEventListener("close-modal", hideModal);

      $(modalEl).one("hidden.bs.modal", function () {
        modalEl.remove();
        ensurePlaceholder();
      });
      $(modalEl).modal("show");
    }

    // HTMX settling restores `class` from the server fragment after swap. If we
    // call Bootstrap's modal("show") immediately, it adds `.show`, then HTMX
    // strips it while leaving the backdrop and body.modal-open behind.
    modalEl.addEventListener("htmx:afterSettle", showModal, { once: true });
  })();
</script>
