<div class="modal fade" id="event-id-modal-{{ job.id }}" tabindex="-1" role="dialog" aria-labelledby="event-id-modal-label-{{ job.id }}" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="event-id-modal-label-{{ job.id }}">Set Event ID</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <input type="search"
               class="form-control mb-3"
               name="q"
               placeholder="Search event IDs…"
               autocomplete="off"
               hx-get="{% url 'bilbyui:event_id_search' %}?job_id={{ job.id }}"
               hx-trigger="input changed delay:250ms, search"
               hx-target="#event-id-results"
               hx-swap="innerHTML" />
        <div id="event-id-results">
          <p class="text-muted">Type to search…</p>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  (function () {
    var modalEl = document.getElementById("event-id-modal-{{ job.id }}");
    if (!modalEl) return;
    modalEl.addEventListener("close-modal", function () {
      if (typeof $ !== "undefined" && $.fn.modal) {
        $(modalEl).modal("hide");
      }
    });
    if (typeof $ !== "undefined" && $.fn.modal) {
      $(modalEl).modal("show");
    }
  })();
</script>
