<tr>
  <td>
    {% if file.is_dir %}
      {{ file.path }}
    {% elif job.job_type == 2 %}
      <a href="{{ file.path }}" target="_blank" rel="noopener noreferrer">{{ file.path }}</a>
    {% elif file.download_token %}
      <a href="{% url 'bilbyui:file_download' job_id=job.id token=file.download_token %}" target="_blank">
        {{ file.path }}
      </a>
    {% else %}
      {{ file.path }}
    {% endif %}
  </td>
  <td>{% if file.is_dir %}Directory{% else %}File{% endif %}</td>
  <td>{{ file.file_size|default:"—" }}</td>
</tr>
